<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>高翔 | 全栈开发工程师</title>
    <script>
      // GitHub Pages SPA redirect workaround
      // Encodes the current path/query/hash into the search param and redirects to index.html
      var pathSegmentsToKeep = 1; // number of path segments for the repo name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
